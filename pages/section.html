<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подпорные стенки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="/scripts/theme.js"></script>
    <script type="module" defer src="/scripts/layout.js"></script>
    <script type="module" defer src="/scripts/render/render-section.js"></script>
    
    <div class="app-container">
        <header></header>
        <main class="main-content">
            <!-- LINKS -->
            <div class="page-header">
                <p class="greeting-sub">
                    Home > 
                    <a href="/pages/sections.html">Сечения</a> > 
                    <a style="font-size: 1.2rem; text-transform: uppercase;" id="name">${this.name}</a>
                </p>
                <div class="grid small-gap" style="grid-template-columns: auto 1fr 1fr">
                    <a id="info" class="date-info" >${this.name}</a>
                    <button id="saveBtn" class="btn btn-primary" title="Скачать">Скачать</button>
                    <button id="saveBtn" class="btn btn-primary" title="Сохранить">Сохранить</button>
                </div>
            </div>


            <div class="grid stratch" style="grid-template-columns: 1fr 1fr; height:100%">
                <div class="card-surface scroll">
                    <div class="form-group gap ">
                        <input type="text" class="form-input bg-primary" placeholder=" " id="description">
                        <label class="form-label">Описание:</label>
                    </div>
                    <div class="card gap">
                        <div id="params"></div>
                    </div>
                    <div class="card gap">
                        <div id="dotsX"></div>
                    </div>
                    <div class="card gap">
                        <div id="dotsY"></div>
                    </div>
                    <div class="card gap">
                        <div id="drawPlan"></div>
                    </div>
                    <div class="card gap">
                        <div id="drawFasad"></div>
                    </div>
                    <div class="card">
                        <div id="drawSection"></div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column" id="canvasContainer">
                    <div class="nav-menu card-nav" style="position: absolute; top: 6.2rem;"></div>
                    <div class="card tabs gap" style="flex-grow: 1">
                        <div class="tab" switch-name="section" id="sectionCanvas" style="height: 100%;"></div>
                        <div class="tab" switch-name="plan" id="planCanvas" style="height: 100%;"></div>
                        <div class="tab" switch-name="fasad" id="fasadCanvas" style="height: 100%;"></div>
                    </div>
                    <div class="card grid" id="previewCard">
                        <div style="display: flex">
                            <div style="margin-right: auto;">
                                <h3 class="card-title">
                                    Настройки предпросмотра
                                </h3>
                                <p class="card-subtitle">
                                    Настройки высоты сечения, смещения, оси фасада и оси плана
                                </p>
                            </div>
                            <button id="switchHideBtn" class="btn btn-secondary">▲</button>
                        </div>
                        <div switch-hide id="previewSection">
                            <div class="grid parent small-gap">
                                <div class="form-group div1" style="height: 100%;">
                                    <input id="offset" type="text" class="form-input bg-surface" placeholder=" "></input>
                                    <label class="form-label">
                                        Смещение
                                    </label>
                                </div>
                                <div class="form-group div2">
                                    <input id="start" type="text" class="form-input bg-surface" placeholder=" "></input>
                                    <label class="form-label">
                                        ПК начала
                                    </label>
                                </div>
                                <div class="form-group div3">
                                    <input id="length" type="text" class="form-input bg-surface" placeholder=" "></input>
                                    <label class="form-label">
                                        Длина
                                    </label>
                                </div>

                                <div class="form-group div4">
                                    <textarea id="up" type="text" class="form-input bg-surface" placeholder=" "></textarea>
                                    <label class="form-label">
                                        Отметка верха
                                    </label>
                                </div>
                                <div class="form-group div5">
                                    <textarea id="down" type="text" class="form-input bg-surface" placeholder=" "></textarea>
                                    <label class="form-label">
                                        Отметка низа
                                    </label>
                                </div>
                                <div class="form-group div6">
                                    <textarea id="plan" type="text" class="form-input bg-surface" placeholder=" "></textarea>
                                    <label class="form-label">
                                        План
                                    </label>
                                </div>
                                <div class="form-group div7">
                                    <textarea id="fasad" type="text" class="form-input bg-surface" placeholder=" "></textarea>
                                    <label class="form-label">
                                        Фасад
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="footer"></footer>
    </div>
</body>
</html>
