<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки — Подпорные стенки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="/scripts/theme.js"></script>
    <script type="module" defer src="/scripts/layout.js"></script>
    <script type="module" defer src="/scripts/render/render-settings.js"></script>

    <div class="app-container">
        <header></header>
        <main class="main-content">
            <div class="page-header">
                <p class="greeting-sub">Home &gt; <a href="/pages/settings.html" style="font-size: 1.1rem">Настройки</a></p>
            </div>

            <div class="grid">
                

            <div class="grid stratch" style="grid-template-columns: 1fr 1fr; height:100%">
                <div class="card gap">
                    <h2 class="card-title">Значения по умолчанию</h2>
                    <p class="card-subtitle gap">Для неизвестных имён слоёв и подстановки в пустых ячейках</p>

                    <div class="grid small-gap gap" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                        <div class="form-group">
                            <input type="text" class="form-input bg-surface" id="fallbackColor" placeholder=" ">
                            <label class="form-label">Цвет (#hex)</label>
                        </div>
                        <div class="form-group">
                            <input type="number" class="form-input bg-surface" id="fallbackWidth" placeholder=" " min="0.25" step="0.25">
                            <label class="form-label">Толщина линии</label>
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input bg-surface" id="fallbackOis" placeholder=" ">
                            <label class="form-label">Имя слоя в AutoCad</label>
                        </div>
                    </div>
                    <div class="gap" id="layersTable"></div>

                    <div class="grid" style="grid-template-columns: 1fr 1fr; align-items: center;">
                        <button type="button" class="btn btn-primary" id="saveLayers">Сохранить</button>
                        <button type="button" class="btn btn-secondary" id="resetLayers">Сбросить к умолчанию</button>
                    </div>
                    <p class="card-subtitle" id="saveStatus" aria-live="polite"></p>
                </div>
                <div class="card gap"></div>
            </div>


            </div>
        </main>
        <footer class="footer"></footer>
    </div>
</body>
</html>
